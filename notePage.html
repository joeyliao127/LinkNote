<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- shared resuroce -->
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&family=Open+Sans:ital,wght@0,300;1,400&family=Titillium+Web:ital,wght@1,200&family=Ubuntu:wght@500&display=swap"
      rel="stylesheet"
    />
    <!-- /google font/ -->
    <link rel="icon" href="/static/resource/images/nodes-blue.png" />
    <!-- /shared resuroce/ -->
    <link rel="stylesheet" href="/static/notePage/style/style.css" />
    <title>Note</title>
  </head>
  <body>
    <section class="nav flex btn">
      <img src="/static/resource/images/node-green.png" alt="" />
      <h1>LinkNote</h1>
    </section>
    <div class="wrapper flex">
      <section class="sideBar-wrapper flex">
        <div class="sideBar-ctn-invitePartner">
          <p>Invite your partner</p>
          <div class="inviteInput flex">
            <input type="text" id="inviteUserEmail" placeholder="Email" />
            <img src="/static/resource/images/link-white.png" alt="link" />
          </div>
        </div>
        <div class="sideBar-ctn-notes">
          <div class="notes-topToolsBar flex">
            <p>Project1</p>
            <div class="tools flex">
              <div class="tool" id="newNoteBtn">
                <img src="/static/resource/images/add.png" alt="add" />
              </div>
              <div class="tool" id="starBtn">
                <img src="/static/resource/images/star-full.png" alt="star" />
              </div>
              <div class="tagBtn">
                <img
                  src="/static/resource/images/tag.png"
                  alt="tag"
                  id="#notebookTagBtn"
                />
                <div class="tagList flex display-none">
                  <div class="tagItem flex">
                    <p>tag1</p>
                    <img
                      src="/static/resource/images/trash-white.png"
                      alt="trash"
                    />
                  </div>

                  <div class="tagItem flex">
                    <p>tag1</p>
                    <img
                      src="/static/resource/images/trash-white.png"
                      alt="trash"
                    />
                  </div>
                  <div class="tagItem flex">
                    <p>tag1</p>
                    <img
                      src="/static/resource/images/trash-white.png"
                      alt="trash"
                    />
                  </div>
                  <div class="tagBtnGroup flex">
                    <input type="text" id="createTag" placeholder="new tag" />
                    <button>Create</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="notes-group flex">
            <div class="note-item flex selected">
              <p>What is PM and Why?</p>
              <img src="/static/resource/images/star-full.png" alt="star" />
            </div>
          </div>
        </div>
        <div class="sideBar-ctn-editors">
          <p class="editor-type">Owner</p>
          <div class="editor-item">
            <p>Joey Liao</p>
          </div>
          <p class="editor-type">Co-editor</p>
          <div class="editor-item flex">
            <p>Farren Song</p>
            <img src="/static/resource/images/close.png" alt="close" />
          </div>
          <div class="editor-item flex">
            <p>Farren Song</p>
            <img src="/static/resource/images/close.png" alt="close" />
          </div>
          <div class="editor-item flex">
            <p>Farren Song</p>
            <img src="/static/resource/images/close.png" alt="close" />
          </div>
          <div class="editor-item flex">
            <p>Farren Song</p>
            <img src="/static/resource/images/close.png" alt="close" />
          </div>
        </div>
      </section>
      <main class="edit-wrapper">
        <div class="edit-area">
          <div class="edit-ctn-tools flex">
            <input type="text" id="noteName" value="New note" />
            <div class="edit-group-tools flex">
              <!-- <img src="/static/resource/images/lock.png" alt="lock" /> -->
              <img src="/static/resource/images/star-empty.png" alt="lock" />
              <div class="tagBtn">
                <img
                  src="/static/resource/images/tag.png"
                  alt="tag"
                  id="noteTagBtn"
                />
                <div class="tagList flex display-none">
                  <p>Tags</p>
                  <div class="tagItem flex">
                    <p>tag1</p>
                  </div>

                  <div class="tagItem flex">
                    <p>tag2</p>
                  </div>
                  <div class="tagItem flex">
                    <p>tag3</p>
                  </div>
                  <div class="doneGroup">
                    <button id="done">done</button>
                  </div>
                </div>
              </div>

              <!-- <img src="/static/resource/images/share-white.png" alt="lock" /> -->
              <div id="discard">Delete</div>
              <div id="save">Save</div>
            </div>
          </div>
          <div class="edit-ctn-noteContent">
            <!-- <div class="noteContent-tools flex">
              <img src="/static/resource/images/blod.png" alt="blod" />
              <img src="/static/resource/images/italics.png" alt="blod" />
              <img src="/static/resource/images/underline.png" alt="blod" />
              <div></div>
              <img src="/static/resource/images/align-left.png" alt="blod" />
              <img src="/static/resource/images/align-center.png" alt="blod" />
              <img src="/static/resource/images/align-right.png" alt="blod" />
            </div> -->
            <div class="edit-itme-noteContent flex">
              <div class="question-box">
                <h3>Question</h3>
                <input
                  type="text"
                  placeholder="What is the purpose of writing this note in this subject?"
                  id="question"
                />
              </div>
              <textarea
                name="noteContent"
                id="noteContent"
                placeholder="Capture your ideas and record them in this note."
              ></textarea>
              <textarea
                name="distill"
                id="Capture your ideas and record them in this note."
                placeholder="Distill up to three key points"
              ></textarea>
            </div>
          </div>
        </div>
      </main>
    </div>
    <div class="wrapper-notification">
      <div class="notice display-none" id="success">
        <p>Success!</p>
      </div>

      <div class="notice display-none" id="failed">
        <p>Failed...</p>
      </div>

      <div class="notice display-none" id="warn">
        <p>Joey left</p>
      </div>
    </div>
    <script src="/static/base/js/base.js"></script>
    <script src="/static/base/js/notePageNotification.js"></script>
    <script src="/static/notePage/js/notePageMain.js"></script>
    <script src="/static/notePage/js/notePageNav.js"></script>
    <script src="/static/base/js/notePageNotification.js"></script>
    <script src="/static/notePage/js/notePageSideBar.js"></script>
  </body>
</html>
