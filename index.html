<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&family=Open+Sans:ital,wght@0,300;1,400&family=Titillium+Web:ital,wght@1,200&family=Ubuntu:wght@500&display=swap"
      rel="stylesheet"
    />
    <!-- /google font/ -->
    <link rel="icon" href="/static/resource/images/nodes-blue.png" />
    <link rel="stylesheet" href="/static/index/style.css" />
    <title>Link Note</title>
  </head>
  <body>
    <div class="nav">
      <div class="logo flex">
        <img src="/static/resource/images/node-green.png" alt="link-note" />
        <h1>LinkNote</h1>
      </div>
    </div>

    <div class="kv-wrapper">
      <main class="flex">
        <section class="slogan-ctn">
          <h2>Collaborate with partners</h2>
          <div class="subtitle">
            <p>Build your second brain</p>
            <p id="slogan-nextLine">
              with <span id="slogan-CODE">CODE</span> Method.
            </p>
          </div>

          <div class="CODE flex">
            <!-- <p>What is the CODE?</p> -->
            <p><span class="initials">C</span>apture</p>
            <p><span class="initials">O</span>rganization</p>
            <p><span class="initials">D</span>istill</p>
            <p><span class="initials">E</span>xpress</p>
          </div>
        </section>
        <section class="signInUp-area">
          <div class="login-ctn blurry-background">
            <form action="" class="flex">
              <p id="login-text">SignIn</p>
              <div class="email flex input-box">
                <input
                  type="email"
                  name="email"
                  id="email"
                  placeholder="Email"
                />
                <div class="icon">
                  <img src="/static/resource/images/email.png" alt="email" />
                </div>
              </div>
              <div class="password flex input-box">
                <input
                  type="password"
                  name="password"
                  id="password"
                  placeholder="Password"
                />
                <div class="icon">
                  <img
                    src="/static/resource/images/password.png"
                    alt="password"
                  />
                </div>
              </div>
              <!-- <p class="error-msg">username or password incorrect</p> -->
              <button>SignIn</button>

              <div class="switch-form">
                <p>Don't have an account? Click<span> Register</span></p>
              </div>
            </form>
          </div>

          <div class="signup-ctn blurry-background form-none">
            <form action="" class="flex">
              <p id="login-text">SignUp</p>
              <div class="email flex input-box">
                <input
                  type="email"
                  name="email"
                  id="email"
                  placeholder="Email"
                />
                <div class="icon">
                  <img src="/static/resource/images/email.png" alt="email" />
                </div>
              </div>
              <div class="password flex input-box">
                <input
                  type="password"
                  name="password"
                  id="password"
                  placeholder="Password"
                />
                <div class="icon">
                  <img
                    src="/static/resource/images/password.png"
                    alt="password"
                  />
                </div>
              </div>
              <div class="password flex input-box">
                <input
                  type="password"
                  name="confirmPassword"
                  id="confirmPassword"
                  placeholder="Confirm Your Password"
                />
                <div class="icon">
                  <img
                    src="/static/resource/images/password.png"
                    alt="password"
                  />
                </div>
              </div>
              <!-- <p class="error-msg">The email has already been registered</p> -->
              <button>SignUp</button>

              <div class="switch-form">
                <p>Back to <span>Sigin</span></p>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
