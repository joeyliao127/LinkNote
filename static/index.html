<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="images/nodes-blue.png" />
    <link rel="stylesheet" href="style/index/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Link Note</title>
  </head>
  <body>
    <div class="kv-wrapper">
      <div class="nav">
        <div class="log flex">
          <img src="images/nodes-blue.png" alt="link-note" />
          <h1>LinkNote</h1>
        </div>
      </div>
      <main class="flex">
        <section class="slogan">
          <h2>
            <span>與夥伴共同協作</span
            ><br />使用專案導向的思維打造第二大腦，提高產出效率！
          </h2>
        </section>

        <div class="login">
          <form action="" class="flex">
            <p>Login</p>
            <div class="email">
              <img src="/static/images/email.png" alt="email" />
              <input type="email" name="email" id="email" />
              <label for="email">Email</label>
            </div>
            <div class="password">
              <img src="/static/images/password.png" alt="password" />
              <input type="password" name="password" id="password" />
              <label for="password">Password</label>
            </div>
            <button>Login</button>
          </form>
          <div class="toSignUp">
            <p>還沒有帳戶？點此<span id="toSignUp">註冊</span></p>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
